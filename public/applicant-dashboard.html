<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Applicant dashboard for Royal Rangers Nigeria Southwest Zone 2.">
  <title>Applicant Dashboard | Royal Rangers Nigeria Southwest Zone 2</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container navbar">
      <a class="brand" href="/">
        <img src="/images/logo.png" alt="Royal Rangers Nigeria Southwest Zone 2">
      </a>
      <button class="nav-toggle" aria-expanded="false">☰</button>
      <nav class="nav-links">
        <a href="/">Home</a>
        <a href="/about.html">About</a>
        <a href="/leadership.html">Leaders</a>
        <a href="/programs.html">Programs</a>
        <a href="/media.html">Media</a>
        <a href="/announcements.html">News</a>
        <a href="/register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="section">
      <div class="section-title">
        <span class="badge">Applicant Dashboard</span>
        <h2>Your registration details</h2>
        <p>View your registration status and details. You must be logged in to see this page.</p>
      </div>
      <div class="contact-card">
        <div id="dashboard-content">
          <p>Loading your details...</p>
        </div>
        <button id="logout-button" class="button" style="margin-top:1rem;">Logout</button>
      </div>
    </section>
  </main>

  <footer class="container footer">
    <div class="footer-row">
      <div><p>Keep your contact details up to date with the zone leadership team.</p></div>
    </div>
  </footer>
  <script src="/js/main.js"></script>
  <script src="/js/applicant-dashboard.js"></script>
</body>
</html>
