<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Applicant login for Royal Rangers Nigeria Southwest Zone 2 to view registration status.">
  <title>Applicant Login | Royal Rangers Nigeria Southwest Zone 2</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <main class="login-container">
    <div class="login-card">
      <div class="login-header">
        <img src="/images/logo.png" alt="Royal Rangers Nigeria Southwest Zone 2" class="login-logo">
        <span class="badge">Applicant Login</span>
        <h2>Welcome Back</h2>
        <p>Sign in to view your registration status and details.</p>
      </div>
      <form id="applicant-login-form" class="login-form">
        <div class="field">
          <label for="applicant-email">Email Address</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
            <input id="applicant-email" name="email" type="email" placeholder="you@example.com" required>
          </div>
        </div>
        <div class="field">
          <label for="applicant-password">Password</label>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
            <input id="applicant-password" name="password" type="password" placeholder="Enter your password" required>
          </div>
        </div>
        <button type="submit" class="button login-btn">Login</button>
        <a href="/forgot-password" class="login-forgot">Forgot Password?</a>
        <p id="login-message" class="login-message"></p>
      </form>
      <p class="login-footer-text">Not registered? <a href="/register.html">Create an account</a></p>
    </div>
  </main>
  <script src="/js/applicant-login.js"></script>
</body>
</html>
